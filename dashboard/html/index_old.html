<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insight Harbor — M365 Copilot Analytics</title>

  <!-- Block all crawlers, search engines, and AI bots -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="bingbot" content="noindex, nofollow" />

  <!-- MSAL.js 2.x for Entra ID authentication (2.28.0 – no initialize() requirement) -->
  <script src="https://alcdn.msauth.net/browser/2.28.0/js/msal-browser.min.js"></script>

  <!-- Chart.js CDN (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- html2canvas for PNG export -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <!-- Application Insights JS SDK for client-side telemetry -->
  <script src="https://js.monitor.azure.com/scripts/b/ai.3.gbl.min.js"></script>

  <style>
    /* ── Design tokens ── */
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d2e;
      --surface2: #242740;
      --border:   #2e3158;
      --accent:   #6c63ff;
      --accent2:  #38bdf8;
      --text:     #e2e8f0;
      --text-dim: #94a3b8;
      --green:    #22c55e;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --radius:   12px;
      --shadow:   0 4px 24px rgba(0,0,0,.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .logo svg { width: 28px; height: 28px; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: .8rem;
      color: var(--text-dim);
    }

    .status-badge {
      padding: .25rem .75rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: .75rem;
    }
    .status-badge.fresh  { background: rgba(34,197,94,.15); color: var(--green); }
    .status-badge.stale  { background: rgba(245,158,11,.15); color: var(--amber); }
    .status-badge.no-data { background: rgba(239,68,68,.15); color: var(--red); }

    /* ── Main layout ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* ── KPI cards ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      transition: transform .15s;
    }
    .kpi-card:hover { transform: translateY(-2px); }

    .kpi-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-dim);
      margin-bottom: .5rem;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .kpi-sub {
      font-size: .8rem;
      color: var(--text-dim);
      margin-top: .4rem;
    }

    .kpi-accent { color: var(--accent); }
    .kpi-accent2 { color: var(--accent2); }
    .kpi-green  { color: var(--green); }

    /* ── Chart grid ── */
    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .chart-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .chart-title {
      font-size: .85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }

    .chart-canvas-wrap {
      position: relative;
      width: 100%;
    }

    /* ── Department table ── */
    .dept-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    .dept-table th {
      text-align: left;
      padding: .5rem .75rem;
      color: var(--text-dim);
      font-weight: 600;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    .dept-table td {
      padding: .6rem .75rem;
      border-bottom: 1px solid rgba(46,49,88,.5);
    }
    .dept-table tr:last-child td { border-bottom: none; }
    .dept-table tr:hover td { background: rgba(255,255,255,.03); }

    .bar-cell {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .bar-cell-fill {
      height: 6px;
      border-radius: 3px;
      background: var(--accent);
      min-width: 3px;
      transition: width .3s ease;
    }

    /* ── Loading / error states ── */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      color: var(--text-dim);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Heatmap ── */
    .heatmap-wrap { padding: 1rem; }
    .heatmap-grid {
      display: grid;
      grid-template-columns: 50px repeat(24, 1fr);
      gap: 2px;
      font-size: .7rem;
    }
    .heatmap-grid .hm-label {
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 6px; color: var(--text-dim); font-weight: 500;
    }
    .heatmap-grid .hm-header {
      text-align: center; color: var(--text-dim); font-weight: 500; padding: 2px 0;
    }
    .heatmap-grid .hm-cell {
      aspect-ratio: 1; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; color: rgba(255,255,255,.7);
      transition: transform .15s;
      cursor: default;
    }
    .heatmap-grid .hm-cell:hover { transform: scale(1.3); z-index: 2; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: .75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    /* ── Auth gate ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      gap: 1.5rem;
    }
    #auth-gate .auth-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    #auth-gate .auth-logo svg { width: 36px; height: 36px; }
    #auth-gate .auth-subtitle {
      color: var(--text-dim);
      font-size: .9rem;
      margin-bottom: 1rem;
    }
    .btn-sign-in {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .75rem 2rem;
      border: none;
      border-radius: 8px;
      background: #2f2f2f;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-sign-in:hover { background: #404040; }
    .btn-sign-in svg { width: 20px; height: 20px; }
    .auth-error {
      color: var(--red);
      font-size: .85rem;
      max-width: 400px;
      text-align: center;
      display: none;
    }
    .access-denied {
      color: var(--amber);
      font-size: .9rem;
      max-width: 480px;
      text-align: center;
      line-height: 1.5;
    }
    .btn-sign-out-sm {
      padding: .25rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      font-size: .75rem;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-sign-out-sm:hover { background: var(--surface2); color: var(--text); }
    .user-badge {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .8rem;
      color: var(--text-dim);
    }
    .user-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700;
    }

    /* ── Department gauge cards ── */
    .gauge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }
    .gauge-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem 1rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 140px;
      flex: 1 1 140px;
      max-width: 200px;
      transition: transform .15s;
    }
    .gauge-card:hover { transform: translateY(-2px); }
    .gauge-card svg circle.gauge-bg {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 8;
    }
    .gauge-card svg circle.gauge-fg {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dasharray .8s ease;
    }
    .gauge-label {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: .5rem;
      text-align: center;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .gauge-value {
      font-size: .95rem;
      font-weight: 800;
      fill: var(--text);
    }

    /* ── License mini stats ── */
    .license-stats-row {
      display: flex;
      justify-content: space-around;
      gap: .75rem;
      margin-top: 1rem;
      padding-top: .75rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .license-stat {
      text-align: center;
      font-size: .75rem;
      color: var(--text-dim);
    }
    .license-stat-value {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-top: .15rem;
    }

    /* ── Tab navigation ── */
    .tab-nav { display: flex; gap: .5rem; padding: 0 2rem; margin-bottom: 1rem; }
    .tab-btn {
      padding: .5rem 1.25rem; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); cursor: pointer;
      font-size: .85rem; transition: all .2s;
    }
    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Export PNG button ── */
    .btn-export-png {
      padding: .25rem .75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text-dim);
      font-size: .75rem;
      cursor: pointer;
      transition: background .2s, color .2s;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }
    .btn-export-png:hover { background: var(--surface2); color: var(--text); }
    .btn-export-png svg { width: 14px; height: 14px; }

    /* ── Responsive: tablet ── */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: .75rem;
        padding: 1rem;
      }
      .header-meta {
        flex-wrap: wrap;
        justify-content: center;
      }
      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .chart-grid {
        grid-template-columns: 1fr;
      }
      .chart-grid-3 {
        grid-template-columns: 1fr;
      }
      .gauge-row {
        justify-content: center;
      }
      .gauge-card {
        flex: 1 1 calc(33.333% - 1rem);
        max-width: calc(33.333% - 1rem);
      }
      .heatmap-grid {
        overflow-x: auto;
      }
      main {
        padding: 1rem;
      }
    }

    /* ── Responsive: phone ── */
    @media (max-width: 480px) {
      .kpi-grid {
        grid-template-columns: 1fr;
      }
      .gauge-card {
        flex: 1 1 calc(50% - 1rem);
        max-width: calc(50% - 1rem);
      }
      .kpi-value {
        font-size: 1.6rem;
      }
      .chart-title {
        font-size: .78rem;
      }
      body {
        font-size: .9rem;
      }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     CONFIGURATION
     Edit DATA_SOURCE and API_BASE_URL below.
     DATA_SOURCE options:
       "api"  — live data from Azure Functions (Phase 7, requires deploy)
       "file" — data.json in the same folder (generated by Python export script)
     ═══════════════════════════════════════════════════════════ -->
<script>
  // Auto-detect API URL: relative path when served via Front Door (ih.data-analytics.tech),
  // direct Functions URL otherwise (SWA default hostname or localhost)
  const _host = location.hostname;
  const _API = (_host === "ih.data-analytics.tech" || _host === "localhost" || _host === "127.0.0.1")
    ? "/api"
    : "https://ih-api-poc01.azurewebsites.net/api";

  const CONFIG = {
    DATA_SOURCE:  "file",                              // "api" or "file"
    API_BASE_URL: _API,
    DATA_FILE:    "data.json",                         // Used when DATA_SOURCE = "file"
    REFRESH_MS:   300000                               // 5-minute auto-refresh
  };
</script>
<!-- ══════════════════════════════════════════════════════════ -->

<!-- ── Auth gate (shown before sign-in) ── -->
<div id="auth-gate">
  <div class="auth-logo">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="13" stroke="#6c63ff" stroke-width="2"/>
      <path d="M14 6v8l5 3" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>

  </div>

    <!-- Microsoft logo -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
    Sign in with Microsoft
  </button>
  <div class="auth-error" id="auth-error"></div>
</div>

<!-- ── App shell (hidden until authenticated) ── -->
<div id="app-shell" style="display:none">
<header>
  <div class="logo">
    <!-- Harbour icon -->
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="13" stroke="#6c63ff" stroke-width="2"/>
      <path d="M14 6v8l5 3" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
      <circle cx="14" cy="14" r="2" fill="#6c63ff"/>
    </svg>
    Insight Harbor
  </div>
  <div class="header-meta">
    <div class="user-badge">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="user-name"></span>
    </div>
    <span id="data-as-of">Loading…</span>
    <span id="status-badge" class="status-badge">—</span>
    <button class="btn-export-png" onclick="exportPNG()" title="Download PNG snapshot"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8m0 0l-3-3m3 3l3-3"/><path d="M3 12h10v2H3z"/></svg>PNG</button>
    <button class="btn-sign-out-sm" onclick="signOut()">Sign out</button>
  </div>
</header>

<main id="main-content">
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>Loading Copilot analytics…</p>
  </div>
</main>

<footer>
  Insight Harbor PoC · Data source: ADLS Gen2 <code>ihstoragepoc01/insight-harbor/silver/copilot-usage/</code>
  · Phase 7 dashboard powered by Azure Static Web Apps + Azure Functions
  <span id="footer-api-info"></span>
</footer>
<script>
  // Show API URL in footer when in API mode
  if (CONFIG.DATA_SOURCE === "api") {
    document.getElementById('footer-api-info').innerHTML =
      ' · API: <code>' + CONFIG.API_BASE_URL + '</code>';
  }
</script>
</div> <!-- /app-shell -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Application Insights — client-side telemetry
// ─────────────────────────────────────────────────────────────────────────────
let appInsights = null;
try {
  const aiConfig = {
    connectionString: 'InstrumentationKey=ab758ef9-6220-40f8-899f-ab5787e2fe78;IngestionEndpoint=https://centralus-2.in.applicationinsights.azure.com/;LiveEndpoint=https://centralus.livediagnostics.monitor.azure.com/',
    enableAutoRouteTracking: true,
    disableFetchTracking: false,
    enableCorsCorrelation: true,
    enableRequestHeaderTracking: true,
    enableResponseHeaderTracking: true
  };
  if (window.Microsoft && Microsoft.ApplicationInsights) {
    appInsights = new Microsoft.ApplicationInsights.ApplicationInsights({ config: aiConfig });
    appInsights.loadAppInsights();
    appInsights.trackPageView({ name: 'Insight Harbor Dashboard' });
    console.log('App Insights initialized');
  }
} catch(aiErr) {
  console.warn('App Insights init skipped:', aiErr);
}

/** Track a custom event in App Insights (no-op if SDK not loaded). */
function trackEvent(name, properties, measurements) {
  if (appInsights) {
    appInsights.trackEvent({ name: name }, { ...properties }, { ...measurements });
  }
}

/** Track an exception in App Insights. */
function trackException(error, properties) {
  if (appInsights) {
    appInsights.trackException({ exception: error }, { ...properties });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MSAL Authentication
// ─────────────────────────────────────────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: 'e571ba41-17da-4e7b-85fb-bc6d832d4f78',
    authority: 'https://login.microsoftonline.com/579e8f66-10ec-4646-a923-b9dc013cc0a7',
    redirectUri: window.location.origin,
    postLogoutRedirectUri: window.location.origin
  },
  cache: {
    cacheLocation: 'sessionStorage',
    storeAuthStateInCookie: false
  }
};

// Authorized group Object ID
const AUTHORIZED_GROUP_ID = '97568a14-dd68-4292-b878-700e994b1753';

const msalApp = new msal.PublicClientApplication(MSAL_CONFIG);
let currentAccount = null;

// ── Local dev bypass: skip Entra auth when running on localhost with file mode ──
const _isLocalDev = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                    && CONFIG.DATA_SOURCE === 'file';
if (_isLocalDev) {
  currentAccount = { username: 'local-dev@localhost', name: 'Local Developer', tenantId: 'local', idTokenClaims: { groups: [AUTHORIZED_GROUP_ID] } };
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';
  const initials = 'LD';
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = 'Local Developer';
  init();
} else {
// On every page load, handle any pending redirect response
msalApp.handleRedirectPromise()
  .then(function (redirectResponse) {
    if (redirectResponse && redirectResponse.account) {
      currentAccount = redirectResponse.account;
      authorizeAndLaunch(currentAccount);
      return;
    }
    // Check for existing cached session
    var accounts = msalApp.getAllAccounts();
    if (accounts.length > 0) {
      currentAccount = accounts[0];
      authorizeAndLaunch(currentAccount);
      return;
    }
    // No session – show sign-in button as ready
    var btn = document.getElementById('btn-sign-in');
    btn.disabled = false;
  })
  .catch(function (err) {
    console.error('MSAL redirect error:', err);
    var btn = document.getElementById('btn-sign-in');
    btn.disabled = false;
  });
} // end non-local block

function signIn() {
  var btn = document.getElementById('btn-sign-in');
  btn.disabled = true;
  btn.textContent = 'Redirecting…';
  // Redirect flow – navigates the whole page (no popup blocker issues)
  msalApp.loginRedirect({
    scopes: ['openid', 'profile', 'email'],
    prompt: 'select_account'
  });
}

function signOut() {
  msalApp.logoutRedirect({ account: currentAccount });
}

async function authorizeAndLaunch(account) {
  // Try to get group claims from the ID token first
  let groups = account.idTokenClaims?.groups || [];

  // If no group claims in ID token (overage), call Graph to check membership
  if (groups.length === 0) {
    try {
      const tokenResponse = await msalApp.acquireTokenSilent({
        scopes: ['https://graph.microsoft.com/User.Read'],
        account: account
      });
      const memberOf = await fetch('https://graph.microsoft.com/v1.0/me/memberOf', {
        headers: { Authorization: 'Bearer ' + tokenResponse.accessToken }
      }).then(r => r.json());
      groups = (memberOf.value || []).map(g => g.id);
    } catch (graphErr) {
      console.warn('Graph group check failed, falling back to token claims only:', graphErr);
    }
  }

  if (!groups.includes(AUTHORIZED_GROUP_ID)) {
    // Not authorized
    const gate = document.getElementById('auth-gate');
    gate.innerHTML = `
      <div class="auth-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="13" stroke="#6c63ff" stroke-width="2"/>
          <path d="M14 6v8l5 3" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="2" fill="#6c63ff"/>
        </svg>
        Insight Harbor
      </div>
      <div class="access-denied">
        <strong>Access Denied</strong><br/>
        Your account <strong>${account.username}</strong> is not a member of the
        <em>InsightHarbor-Viewers</em> security group.<br/>
        Contact your administrator for access.
      </div>
      <button class="btn-sign-out-sm" onclick="signOut()" style="margin-top:1rem">Sign out</button>
    `;
    return;
  }

  // Authorized — show the dashboard
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';

  // Set authenticated user context in App Insights
  if (appInsights) {
    appInsights.setAuthenticatedUserContext(account.username, account.tenantId, true);
    trackEvent('UserAuthenticated', { username: account.username });
  }

  // Populate user badge
  const name = account.name || account.username;
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name').textContent = name;

  // Launch dashboard
  init();
  if (CONFIG.REFRESH_MS > 0) {
    setInterval(init, CONFIG.REFRESH_MS);
  }

/**
 * Acquire a fresh ID token for API authentication.
 * The Function App validates this token (audience, issuer, signature).
 */
async function getApiHeaders() {
  if (CONFIG.DATA_SOURCE !== "api" || !currentAccount) return {};
  try {
    const resp = await msalApp.acquireTokenSilent({
      scopes: ['openid', 'profile'],
      account: currentAccount
    });
    return { 'Authorization': 'Bearer ' + resp.idToken };
  } catch (err) {
    console.warn('Silent token acquisition failed, redirecting:', err);
    msalApp.loginRedirect({ scopes: ['openid', 'profile'] });
    return {};
  }
}

async function fetchData() {
  if (CONFIG.DATA_SOURCE === "api") {
    const headers = await getApiHeaders();
    const opts = { headers };
    const fetchStart = performance.now();
    const [summary, trend, dept, workload, licensing, hourly] = await Promise.all([
      fetch(`${CONFIG.API_BASE_URL}/summary`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.API_BASE_URL}/trend?days=30`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.API_BASE_URL}/department`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.API_BASE_URL}/workload`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.API_BASE_URL}/licensing`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
      fetch(`${CONFIG.API_BASE_URL}/hourly`, opts).then(r => { if (!r.ok) throw new Error(`API ${r.status}`); return r.json(); }),
    ]);
    const fetchMs = Math.round(performance.now() - fetchStart);
    trackEvent('DataFetched', { source: 'api', endpoints: '6' }, { durationMs: fetchMs, totalRecords: summary.totalRecords || 0 });
    return {
      summary, trend: trend.trend, departments: dept.departments,
      workloads: workload.workloads, licensing, hourly: hourly.cells || []
    };
  } else {
    const raw = await fetch(CONFIG.DATA_FILE).then(r => r.json());
    // data.json format (generated by powerbi-setup-guide export snippet):
    // { totalPrompts, activeUsers, topWorkload, dataAsOf, byDepartment, byWorkload, dailyTrend }
    const summary = {
      totalPrompts:   raw.totalPrompts     || 0,
      activeUsers:    raw.activeUsers      || 0,
      topWorkload:    raw.topWorkload      || '—',
      dataAsOf:       raw.dataAsOf         || null,
      agentUsageRate: raw.agentUsageRate   || 0,
      totalRecords:   raw.totalRecords     || raw.totalPrompts || 0
    };
    const trend = Object.entries(raw.dailyTrend || {})
      .map(([date, prompts]) => ({ date, prompts }))
      .sort((a, b) => a.date.localeCompare(b.date))
      .slice(-30);
    const maxDeptPrompts = Math.max(...Object.values(raw.byDepartment || { _: 1 }));
    const departments = Object.entries(raw.byDepartment || {})
      .map(([d, u]) => ({ department: d, users: u, prompts: 0 }))
      .sort((a, b) => b.users - a.users);
    const workloads = Object.entries(raw.byWorkload || {})
      .map(([w, r]) => ({ workload: w, records: r }))
      .sort((a, b) => b.records - a.records);
    const licensing = { tiers: [], adoptionRate: 0, copilotLicensed: 0, copilotActive: 0 };
    return { summary, trend, departments, workloads, licensing, hourly: [] };
  }
}

  return String(n);
}

function renderDeptGauges(departments) {
  const top6 = departments.slice(0, 6);
  if (top6.length === 0) return '';
  const maxUsers = Math.max(...top6.map(d => d.users || 0), 1);
  const r = 40, cx = 50, cy = 50, sw = 8;
  const circumference = 2 * Math.PI * r;

  const cards = top6.map(d => {
    const users = d.users || 0;
    const pct = Math.min(users / maxUsers, 1);
    const dashLen = pct * circumference;
    const color = users > 5 ? 'var(--green)' : users >= 3 ? 'var(--amber)' : 'var(--red)';
    return `
      <div class="gauge-card">
        <svg viewBox="0 0 100 100" width="90" height="90">
          <circle class="gauge-bg" cx="${cx}" cy="${cy}" r="${r}"/>
          <circle class="gauge-fg" cx="${cx}" cy="${cy}" r="${r}"
            stroke="${color}"
            stroke-dasharray="0 ${circumference}"
            transform="rotate(-90 ${cx} ${cy})"
            data-target="${dashLen} ${circumference - dashLen}"/>
          <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" class="gauge-value">${users}</text>
        </svg>
        <div class="gauge-label" title="${d.department}">${d.department}</div>
      </div>`;
  }).join('');

  return `<div class="gauge-row">${cards}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Heatmap — hour-of-day × day-of-week
// ─────────────────────────────────────────────────────────────────────────────
function renderHeatmap(cells) {
  if (!cells || cells.length === 0) return '';

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  // Build lookup: key = "dow-hour"
  const lookup = {};
  let maxCount = 1;
  cells.forEach(c => {
    const key = c.dow + '-' + c.hour;
    lookup[key] = c.count;
    if (c.count > maxCount) maxCount = c.count;
  });

  function cellColor(count) {
    if (count === 0) return 'rgba(255,255,255,.04)';
    const intensity = Math.min(count / maxCount, 1);
    // Gradient from dim purple to bright accent
    const r = Math.round(108 * intensity);
    const g = Math.round(99 * (1 - intensity * 0.5));
    const b = Math.round(255 * (0.3 + intensity * 0.7));
    const a = 0.2 + intensity * 0.8;
    return `rgba(${r}, ${g}, ${b}, ${a})`;
  }

  // Header row (hours 0-23)
  let headerCells = '<div class="hm-label"></div>';
  for (let h = 0; h < 24; h++) {
    headerCells += `<div class="hm-header">${h}</div>`;
  }

  // Data rows (Mon-Sun)
  let rows = '';
  for (let d = 0; d < 7; d++) {
    rows += `<div class="hm-label">${days[d]}</div>`;
    for (let h = 0; h < 24; h++) {
      const count = lookup[d + '-' + h] || 0;
      const bg = cellColor(count);
      rows += `<div class="hm-cell" style="background:${bg}" title="${days[d]} ${h}:00 — ${count} prompts">${count > 0 ? count : ''}</div>`;
    }
  }

  return `
    <div class="chart-card" style="grid-column: 1 / -1">
      <h3>Prompt Activity Heatmap</h3>
      <p style="font-size:.75rem;color:var(--text-dim);margin-bottom:.75rem">
        Prompt volume by hour of day and day of week
      </p>
      <div class="heatmap-wrap">
        <div class="heatmap-grid">
          ${headerCells}
          ${rows}
        </div>
      </div>
    </div>`;
}

function updateHeaderStatus(dataAsOf) {
  const badge = document.getElementById('status-badge');
  const meta  = document.getElementById('data-as-of');

  if (!dataAsOf) {
    meta.textContent = 'No data';
    badge.textContent = 'No Data';
    badge.className = 'status-badge no-data';
    return;
  }

  const loaded = new Date(dataAsOf);
  const ageH   = (Date.now() - loaded.getTime()) / 3_600_000;

  meta.textContent = `Data as of ${loaded.toLocaleDateString()} ${loaded.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;

  if (ageH <= 25) {
    badge.textContent = 'Fresh';
    badge.className = 'status-badge fresh';
  } else {
    badge.textContent = `Stale (${Math.round(ageH)}h)`;
    badge.className = 'status-badge stale';
  }
}

    trackEvent('TabRendered', { tab: _activeTab });
    if (_activeTab === 'overview') {
      renderOverviewTab();
    } else {
      renderTeamsTab();
    }

  } catch (err) {
    console.error(err);
    trackException(err, { component: 'init', dataSource: CONFIG.DATA_SOURCE });
    const isAuthError = err.message && err.message.includes('401');
    const isApiMode = CONFIG.DATA_SOURCE === 'api';
    let helpText;
    if (isAuthError) {
      helpText = 'Authentication failed. Your session may have expired. <a href="javascript:signOut()" style="color:var(--accent)">Sign out and sign in again</a>.';
    } else if (isApiMode) {
      helpText = 'Check that the Azure Functions API at <code>' + CONFIG.API_BASE_URL + '</code> is deployed and the CORS origin is configured. ' +
        'Or edit CONFIG.DATA_SOURCE to "file" and serve <code>data.json</code> locally.';
    } else {
      helpText = 'Run the Python pipeline to generate <code>dashboard/html/data.json</code>, or change DATA_SOURCE to "api".';
    }
    main.innerHTML = `
      <div class="loading-overlay">
        <p style="color:var(--red)">Failed to load data: ${err.message}</p>
        <p style="margin-top:.5rem;font-size:.85rem;color:var(--text-dim)">
          ${helpText}
        </p>
      </div>`;

    document.getElementById('status-badge').textContent = 'Error';
    document.getElementById('status-badge').className = 'status-badge no-data';
    document.getElementById('data-as-of').textContent = '—';
  }
}

// init() and refresh are now called by authorizeAndLaunch() after successful auth
</script>
</body>
</html>
